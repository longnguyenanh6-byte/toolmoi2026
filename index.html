<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio Link -TOOL MỚI NHẤT 2026 | Xuân Phát Tài</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 1. CẤU HÌNH & FONT */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap');

        :root {
            --red-deep: #8E0E00;
            --red-bright: #cb1c1c;
            --gold: #FFD700;
            --gold-light: #fff2b2;
            --gold-gradient: linear-gradient(45deg, #FFD700, #FDB931, #FFD700);
            --text-color: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at center, var(--red-bright), var(--red-deep));
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- CANVAS BACKGROUND (HOA RƠI) --- */
        #flower-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- TRANG TRÍ LỒNG ĐÈN --- */
        .lantern-container {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1;
            pointer-events: none;
        }
        
        .lantern {
            width: 60px;
            height: 80px;
            background: radial-gradient(circle, #ff5f5f, #a80000);
            border-radius: 20px;
            border-top: 5px solid #444;
            border-bottom: 5px solid #FFD700;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 30px rgba(255, 100, 100, 0.5);
            animation: swing 3s ease-in-out infinite alternate;
            transform-origin: top center;
        }

        .lantern::after {
            content: '';
            position: absolute;
            bottom: -20px; left: 50%;
            transform: translateX(-50%);
            width: 4px; height: 20px;
            background: #FFD700;
            box-shadow: 0 5px 0 red;
        }
        
        .lantern::before { /* Dây treo */
            content: '';
            position: absolute;
            top: -50px; left: 50%;
            transform: translateX(-50%);
            width: 2px; height: 50px;
            background: #444;
        }

        .lantern:nth-child(2) { animation-delay: 1s; height: 70px; width: 50px; top: -10px; }

        /* 2. KHUNG CHÍNH (CARD TẾT) */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 25px;
            text-align: center;
            position: relative;
            z-index: 2;
            
            /* Hiệu ứng kính đỏ mờ viền vàng */
            background: rgba(100, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 2px solid var(--gold);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4), inset 0 0 20px rgba(255, 215, 0, 0.2);
            
            animation: zoomIn 0.8s ease-out;
        }

        /* Họa tiết góc (Hoa văn cổ) */
        .corner-decor {
            position: absolute;
            width: 40px; height: 40px;
            border: 3px solid var(--gold);
            pointer-events: none;
        }
        .top-left { top: 15px; left: 15px; border-right: none; border-bottom: none; border-radius: 10px 0 0 0; }
        .top-right { top: 15px; right: 15px; border-left: none; border-bottom: none; border-radius: 0 10px 0 0; }
        .bottom-left { bottom: 15px; left: 15px; border-right: none; border-top: none; border-radius: 0 0 0 10px; }
        .bottom-right { bottom: 15px; right: 15px; border-left: none; border-top: none; border-radius: 0 0 10px 0; }

        /* 3. PROFILE */
        .profile-section { margin-bottom: 30px; position: relative; }

        .avatar-frame {
            width: 120px; height: 120px;
            margin: 0 auto;
            position: relative;
            padding: 5px;
            background: var(--gold-gradient);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
        }

        .avatar-img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #8E0E00;
        }

        /* Chữ Thư Pháp */
        .username {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-top: 15px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            font-weight: 700;
        }

        .bio-text {
            color: #ffecd2;
            font-size: 1rem;
            margin-top: 5px;
            font-weight: 400;
        }
        
        .year-tag {
            background: var(--gold);
            color: #8E0E00;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-top: 5px;
            display: inline-block;
        }

        /* 4. LINKS (PHONG CÁCH CÂU ĐỐI ĐỎ) */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            position: relative;
            background: linear-gradient(90deg, #990000 0%, #cc0000 100%);
            border: 1px solid var(--gold);
            padding: 15px 20px;
            border-radius: 50px; /* Bo tròn kiểu hiện đại */
            color: var(--gold-light);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Hiệu ứng lấp lánh chạy qua nút */
        .link-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.4), transparent);
            transition: 0.5s;
        }
        .link-btn:hover::after { left: 100%; }

        .link-btn:hover {
            transform: translateY(-3px);
            background: #b30000;
            box-shadow: 0 0 15px var(--gold);
            border-color: #fff;
        }

        .btn-content { display: flex; align-items: center; gap: 15px; }
        
        .btn-img-logo {
            width: 35px; height: 35px;
            object-fit: contain;
            filter: drop-shadow(0 0 2px var(--gold));
        }

        .btn-text {
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        /* Icon hoa mai trang trí nút */
        .flower-icon {
            color: var(--gold);
            font-size: 1.2rem;
            animation: spinSlow 10s linear infinite;
        }

        /* 5. FOOTER */
        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
        footer span { color: var(--gold); font-family: 'Dancing Script', cursive; font-size: 1.2rem;}

        /* ANIMATION */
        @keyframes swing { 
            from { transform: rotate(-5deg); } 
            to { transform: rotate(5deg); } 
        }
        @keyframes spinSlow { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>

    <script>
        /* --- HIỆU ỨNG MƯA HOA ĐÀO & HOA MAI --- */
        const canvas = document.getElementById('flower-bg');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Tạo cánh hoa
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.size = Math.random() * 5 + 3; // Kích thước cánh hoa
                this.speedX = Math.random() * 2 - 1; // Gió thổi ngang
                this.speedY = Math.random() * 2 + 1; // Tốc độ rơi
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
                // Màu: Random giữa Vàng (Mai) và Hồng (Đào)
                this.color = Math.random() > 0.5 ? '#FFD700' : '#ff99cc'; 
                this.opacity = Math.random() * 0.5 + 0.3;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                this.opacity -= 0.001; // Mờ dần khi rơi

                // Gió thổi nhẹ qua lại
                this.x += Math.sin(this.y * 0.01);

                if (this.y > height || this.opacity <= 0) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                
                // Vẽ hình cánh hoa (Oval)
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size / 2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Số lượng cánh hoa
        function initParticles() {
            particles = [];
            const count = window.innerWidth < 600 ? 30 : 60; // Ít hoa hơn trên mobile
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
                // Random vị trí ban đầu để không rơi cùng lúc
                particles[i].y = Math.random() * height;
            }
        }
        initParticles();

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
